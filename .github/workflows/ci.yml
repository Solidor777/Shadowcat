name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      # The server embeds the client bundle (dist/), so build it before any cargo
      # step (the embed test reads it; the release build embeds it at compile time).
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build client bundle (embedded by the server)
        run: pnpm --filter @shadowcat/shell build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # Format is OS-independent; run once to avoid redundant matrix cost.
      - name: Format
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check
      # Clippy runs on every OS so cfg-gated code is linted on its own target.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test (emits ts-rs bindings)
        run: cargo test --all
      # ts-rs regenerates bindings on test; the LF-committed files only match a
      # Linux regen (a Windows working-tree regen may differ on EOL), so the
      # sync check is Linux-only. .gitattributes pins these files to LF.
      - name: ts-rs bindings in sync
        if: runner.os == 'Linux'
        run: git diff --exit-code src/types/generated
      - name: Release build
        run: cargo build --release
      - name: Binary size budget
        shell: bash
        run: |
          bin="target/release/shadowcat${{ runner.os == 'Windows' && '.exe' || '' }}"
          size=$(wc -c < "$bin")
          echo "release binary size: ${size} bytes"
          # 60 MiB guardrail; tighten as the binary's real baseline settles.
          test "${size}" -lt 62914560
      # Assemble the icon-carrying distributable. Windows is excluded: the icon
      # is embedded in the .exe at build time (build.rs). macOS -> .app (.icns);
      # Linux -> staging tree with a .desktop entry + hicolor PNG.
      - name: Package (icon bundle)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/package.sh "${{ runner.os == 'macOS' && 'macos' || 'linux' }}"
      - name: Upload package
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: shadowcat-${{ runner.os }}
          path: target/package/

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm lint
      - run: pnpm --filter @shadowcat/shell build

  # Cross-runtime end-to-end: the real @shadowcat/core client driven against the
  # real Rust test_server. Needs both toolchains, so it is its own single-OS job
  # (the rust matrix already proves cross-OS build; this proves the boundary).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The shadowcat lib embeds dist/ (rust-embed requires the folder at compile
      # time), so the client must be built before any cargo build of the server.
      - run: pnpm --filter @shadowcat/shell build
      # Pre-build the server so the in-test spawn does not pay the compile cost.
      - run: cargo build -p shadowcat --bin test_server
      - run: pnpm --filter @shadowcat/core test:e2e

  # Browser end-to-end: the built `shadowcat` binary serves the embedded SPA + /api
  # on one origin; Playwright drives the entry flow against it. Needs both
  # toolchains (global-setup builds dist/ + the binary), so its own single-OS job.
  ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shadowcat/shell exec playwright install --with-deps chromium
      - run: pnpm --filter @shadowcat/shell e2e
